<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>NEXUS // TERMINALE NOTIZIE MONDIALE</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #060910;
            --bg-panel: #0a0f18;
            --bg-hover: #131c2a;
            --border: #162030;
            --border-hi: #1e3050;
            --accent: #00c8ff;
            --accent2: #00ff88;
            --brk: #ff2d4a;
            --brk-bg: rgba(255, 45, 74, .15);
            --brk-b: rgba(255, 45, 74, .45);
            --text: #b8cce0;
            --muted: #3c5070;
            --dim: #1e3050;
            --bright: #ffffff;
            --font: 'JetBrains Mono', 'Courier New', monospace;
        }

        html,
        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
            font-weight: 400;
            line-height: 1.4;
            overflow-x: hidden;
            overflow-y: auto;
        }

        a {
            color: inherit;
            text-decoration: none
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-panel);
            border-left: 1px solid var(--border)
        }

        ::-webkit-scrollbar-thumb {
            background: var(--muted);
            border-radius: 5px;
            border: 2px solid var(--bg-panel)
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent)
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 200, 255, 0.03) 50%, rgba(0, 0, 0, 0) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 999;
            opacity: 0.5
        }

        /* ── HEADER ──────────────────────────────────────────────────────────── */
        #hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            height: 44px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-panel);
            flex-shrink: 0;
            white-space: nowrap
        }

        #hdr .logo {
            color: var(--accent);
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(0, 200, 255, .3)
        }

        #hdr .logo span {
            color: var(--dim)
        }

        .vd {
            width: 1px;
            height: 16px;
            background: var(--border);
            margin: 0 16px
        }

        #hdr .sb {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 11px;
            flex-grow: 1
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
            box-shadow: 0 0 8px rgba(0, 0, 0, 0)
        }

        .dot.g {
            background: var(--accent2);
            box-shadow: 0 0 12px var(--accent2)
        }

        .dot.r {
            background: var(--brk);
            box-shadow: 0 0 12px var(--brk);
            animation: pulse 1.5s infinite
        }

        @keyframes pulse {
            0% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }

            100% {
                opacity: 1
            }
        }

        #nxt {
            font-size: 11px;
            color: var(--muted)
        }

        #clk {
            font-weight: 700;
            font-size: 15px;
            color: var(--bright);
            letter-spacing: 2px;
            margin-left: 20px
        }

        /* ── BREAKING TICKER ─────────────────────────────────────────────────── */
        #ticker {
            display: none;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: var(--bg-panel);
            font-size: 12px;
            height: 32px;
            overflow: hidden;
            white-space: nowrap
        }

        #ticker.on {
            display: flex
        }

        .ticker-label {
            background: var(--brk);
            color: #fff;
            font-weight: 700;
            padding: 0 12px;
            line-height: 32px;
            letter-spacing: 1px;
            z-index: 2
        }

        #tkscroll {
            padding-left: 20px;
            animation: scrollLeft 300s linear infinite;
            font-weight: 500
        }

        #tkscroll a {
            color: var(--bright);
            text-shadow: 0 0 8px rgba(255, 255, 255, .3)
        }

        #tkscroll a:hover {
            color: var(--brk);
            text-decoration: underline
        }

        @keyframes scrollLeft {
            0% {
                transform: translateX(100vw)
            }

            100% {
                transform: translateX(-100%)
            }
        }

        /* ── SEARCH & FILTERS ────────────────────────────────────────────────── */
        #srow {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            flex-shrink: 0
        }

        .search-icon {
            color: var(--muted)
        }

        #srch {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--bright);
            font-family: var(--font);
            font-size: 13px;
            outline: none;
            padding: 4px 0
        }

        #srch::placeholder {
            color: var(--dim)
        }

        .cat-filters {
            display: flex;
            gap: 6px
        }

        .cf {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 4px 10px;
            font-size: 11px;
            font-family: var(--font);
            cursor: pointer;
            border-radius: 2px;
            transition: all .2s
        }

        .cf:hover {
            border-color: var(--border-hi);
            color: var(--text)
        }

        .cf.active {
            background: var(--border-hi);
            color: var(--bright);
            border-color: var(--accent)
        }

        #rcount {
            font-size: 11px;
            color: var(--muted);
            width: 100px;
            text-align: right
        }

        /* ── MAP AREA ────────────────────────────────────────────────────────── */
        #mapwrap {
            position: relative;
            width: 100%;
            height: 260px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            background: #04070f
        }

        #mtt {
            position: absolute;
            pointer-events: none;
            opacity: 0;
            transition: opacity .2s;
            background: rgba(10, 15, 24, .95);
            border: 1px solid var(--border-hi);
            padding: 10px;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .5);
            backdrop-filter: blur(4px);
            z-index: 10;
            width: 300px
        }

        .mt-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 4px
        }

        .mt-headline {
            color: #fff;
            font-size: 12px;
            line-height: 1.4;
            margin-bottom: 6px
        }

        .mt-time {
            font-size: 10px;
            color: var(--muted)
        }

        #map-stats {
            position: absolute;
            right: 20px;
            top: 16px;
            pointer-events: none;
            text-align: right;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 2px;
            font-weight: 700;
            line-height: 1.8
        }

        /* ── ADS ─────────────────────────────────────────────────────────────── */
        #ad-top {
            width: 100%;
            background: #080c14;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90px;
            position: relative
        }

        #ad-top::before {
            content: 'ADVERTISEMENT SLOT';
            position: absolute;
            color: var(--dim);
            font-size: 10px;
            letter-spacing: 2px
        }

        #ad-side {
            width: 160px;
            background: #080c14;
            border-left: 1px solid var(--border);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center
        }

        #ad-side::before {
            content: 'AD';
            position: absolute;
            color: var(--dim);
            font-size: 10px;
            letter-spacing: 2px;
            transform: rotate(-90deg)
        }

        /* ── MAIN COLUMNS ────────────────────────────────────────────────────── */
        #main-area {
            display: flex;
            flex-grow: 1;
        }

        #colwrap {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative
        }

        #columns {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
            height: auto;
            justify-content: center;
        }

        .col {
            width: 320px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            background: rgba(10, 15, 24, 0.4);
            height: 600px;
            transition: opacity .3s
        }

        .col-hdr {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-hi);
            margin-bottom: 8px;
            flex-shrink: 0
        }

        .col-name {
            font-weight: 700;
            font-size: 12px;
            margin-bottom: 2px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .col-meta {
            font-size: 10px;
            color: var(--muted)
        }

        .col-cnt {
            font-size: 10px;
            color: var(--dim);
            background: var(--bg);
            padding: 2px 6px;
            border-radius: 10px;
            border: 1px solid var(--border)
        }

        .col-body {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 4px
        }

        .empty {
            padding: 40px 20px;
            text-align: center;
            color: var(--dim);
            font-size: 11px;
            letter-spacing: 2px
        }

        /* ── CARDS ───────────────────────────────────────────────────────────── */
        .card {
            display: block;
            border: 1px solid var(--border);
            background: rgba(10, 15, 24, .4);
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 4px;
            transition: all .2s;
            position: relative;
            overflow: hidden
        }

        .card:hover {
            border-color: var(--border-hi);
            background: var(--bg-hover)
        }

        .card.brk {
            border-color: var(--brk-b);
            background: var(--brk-bg)
        }

        .card.brk:hover {
            border-color: var(--brk);
            box-shadow: 0 0 16px rgba(255, 45, 74, .2)
        }

        .ct {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 6px;
            align-items: center
        }

        .ctag {
            border: 1px solid;
            border-radius: 2px;
            padding: 0 4px;
            font-size: 9px;
            text-transform: uppercase
        }

        .cc-politica {
            color: #facc15;
            border-color: rgba(250, 204, 21, .3)
        }

        .cc-economia {
            color: #60a5fa;
            border-color: rgba(96, 165, 250, .3)
        }

        .cc-tecnologia {
            color: #a78bfa;
            border-color: rgba(167, 139, 250, .3)
        }

        .cc-scienza {
            color: #34d399;
            border-color: rgba(52, 211, 153, .3)
        }

        .cc-mondo {
            color: #94a3b8;
            border-color: rgba(148, 163, 184, .3)
        }

        .cc-urgente {
            color: var(--brk);
            border-color: var(--brk);
            font-weight: 700;
            background: rgba(255, 45, 74, .1)
        }

        .ttl {
            color: var(--bright);
            font-size: 13px;
            font-weight: 400;
            line-height: 1.4;
            margin-bottom: 6px
        }

        .brkbdg {
            display: inline-block;
            background: var(--brk);
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            padding: 0 4px;
            margin-right: 6px;
            border-radius: 2px;
            vertical-align: middle
        }

        .abs {
            font-size: 11px;
            color: var(--text);
            line-height: 1.5;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical
        }

        .src-tag {
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: 10px;
            font-weight: 700;
            opacity: 0;
            transition: opacity .2s
        }

        .card:hover .src-tag {
            opacity: 1
        }

        mark {
            background: rgba(0, 200, 255, .2);
            color: var(--bright);
            padding: 0 2px
        }

        /* ── FOOTER & MODALS ─────────────────────────────────────────────────── */
        #ftr {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            height: 32px;
            border-top: 1px solid var(--border);
            background: var(--bg-panel);
            flex-shrink: 0;
            font-size: 10px;
            color: var(--dim)
        }

        .abadge {
            color: var(--muted);
            cursor: pointer;
            transition: color .2s;
            background: none;
            border: none;
            font-family: var(--font);
            font-size: 10px
        }

        .abadge:hover {
            color: var(--bright)
        }

        #modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .8);
            backdrop-filter: blur(4px);
            z-index: 9000;
            display: none;
            justify-content: center;
            align-items: center
        }

        #modal.on {
            display: flex
        }

        .mbox {
            background: var(--bg-panel);
            border: 1px solid var(--accent);
            padding: 24px;
            box-shadow: 0 0 30px rgba(0, 200, 255, .1);
            max-width: 500px;
            width: 90%
        }

        .mtitle {
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px
        }

        .mtext {
            color: var(--text);
            font-size: 12px;
            line-height: 1.6;
            margin-bottom: 16px
        }

        .mcode {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 12px;
            font-size: 11px;
            color: var(--bright);
            margin-bottom: 16px;
            white-space: pre-wrap;
            word-break: break-all
        }

        .mclose {
            background: transparent;
            border: 1px solid var(--muted);
            color: var(--bright);
            padding: 6px 16px;
            cursor: pointer;
            font-family: var(--font);
            transition: all .2s;
            display: block;
            width: 100%
        }

        .mclose:hover {
            background: var(--border-hi);
            border-color: var(--bright)
        }

        @media(max-width:600px) {
            #ad-side {
                display: none
            }

            .col {
                width: calc(100vw - 28px)
            }

            #columns {
                justify-content: center
            }

            #hdr .logo {
                font-size: 10px;
                letter-spacing: 3px
            }
        }
    </style>

</head>
