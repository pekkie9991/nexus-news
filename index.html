<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta name="description"
        content="NEXUS – Terminale notizie mondiale in tempo reale. Aggregatore RSS da 14 fonti internazionali con mappa interattiva." />
    <title>NEXUS // TERMINALE NOTIZIE MONDIALE</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <!-- ══════════════════════════════════════════════════════════
         GOOGLE ADSENSE — sostituisci ca-pub-XXXXXXXXXX con il tuo
         Publisher ID ricevuto da Google AdSense.
         ══════════════════════════════════════════════════════════ -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXX"
        crossorigin="anonymous"></script>

    <style>
        /* ── RESET & ROOT ──────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #04070f;
            --bg-panel: #07101c;
            --bg-hover: #0f1e30;
            --bg-glass: rgba(7, 16, 28, 0.7);
            --border: #162030;
            --border-hi: #1e3a55;
            --accent: #00d4ff;
            --accent2: #00ff9d;
            --accentw: #5b4bff;
            --brk: #ff2d4a;
            --brk-bg: rgba(255, 45, 74, .12);
            --brk-b: rgba(255, 45, 74, .4);
            --text: #c0d4e8;
            --muted: #3d5570;
            --dim: #1b3050;
            --bright: #ffffff;
            --font: 'JetBrains Mono', 'Courier New', monospace;
            --radius: 6px;
            --glow-a: rgba(0, 212, 255, 0.35);
            --glow-g: rgba(0, 255, 157, 0.35);
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 11px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Scanlines overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, .06) 2px, rgba(0, 0, 0, .06) 4px);
            animation: scan 8s linear infinite;
            opacity: .4;
        }

        @keyframes scan {
            0% {
                background-position: 0 0
            }

            100% {
                background-position: 0 100%
            }
        }

        /* ── HEADER ─────────────────────────────────────────────── */
        #hdr {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 16px;
            height: 42px;
            background: linear-gradient(90deg, #0a1520 0%, #07101c 100%);
            border-bottom: 1px solid var(--border-hi);
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0, 212, 255, .08);
        }

        .logo {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 5px;
            white-space: nowrap;
            text-shadow: 0 0 22px var(--glow-a), 0 0 6px rgba(0, 212, 255, .8);
        }

        .logo span {
            color: var(--muted);
            font-weight: 300
        }

        .vd {
            width: 1px;
            height: 18px;
            background: var(--border);
            flex-shrink: 0
        }

        .sb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 9px;
            color: var(--muted)
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent2);
            box-shadow: 0 0 8px var(--accent2), 0 0 16px rgba(0, 255, 157, .4);
            animation: pulse 2.2s infinite;
        }

        .dot.r {
            background: var(--brk);
            box-shadow: 0 0 8px var(--brk), 0 0 16px rgba(255, 45, 74, .4);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1)
            }

            50% {
                opacity: .3;
                transform: scale(.7)
            }
        }

        #clk {
            margin-left: auto;
            font-size: 14px;
            font-weight: 700;
            color: var(--bright);
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(255, 255, 255, .3)
        }

        #nxt {
            font-size: 9px;
            color: var(--muted);
            letter-spacing: 1px;
            margin-left: 8px
        }

        /* ── BREAKING TICKER ─────────────────────────────────────── */
        #ticker {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 0 14px;
            height: 26px;
            background: linear-gradient(90deg, rgba(255, 20, 40, .25) 0%, transparent 10%, transparent 90%, rgba(255, 20, 40, .25) 100%);
            border-bottom: 1px solid var(--brk-b);
            flex-shrink: 0;
            font-size: 9px;
            color: var(--brk);
            letter-spacing: 2px;
            font-weight: 700;
            overflow: hidden;
            position: sticky;
            top: 42px;
            z-index: 999;
        }

        #ticker.on {
            display: flex
        }

        .ticker-label {
            white-space: nowrap;
            flex-shrink: 0;
            padding: 2px 8px;
            background: var(--brk);
            color: #fff;
            border-radius: 3px;
            animation: blink-bg 1s step-end infinite;
            font-size: 8px;
        }

        @keyframes blink-bg {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .6
            }
        }

        #tkscroll {
            white-space: nowrap;
            animation: mq 160s linear infinite
        }

        #tkscroll a {
            color: inherit;
            text-decoration: none;
            transition: color .2s
        }

        #tkscroll a:hover {
            color: #fff;
            text-shadow: 0 0 12px #ff2d4a
        }

        @keyframes mq {
            0% {
                transform: translateX(100vw)
            }

            100% {
                transform: translateX(-100%)
            }
        }

        /* ── SEARCH ROW ──────────────────────────────────────────── */
        #srow {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 16px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        #srch {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-family: var(--font);
            font-size: 11px;
            color: var(--text);
            caret-color: var(--accent);
            letter-spacing: 1px;
        }

        #srch::placeholder {
            color: var(--dim)
        }

        #srch:focus {
            color: var(--bright)
        }

        .search-icon {
            color: var(--muted);
            font-size: 10px;
            white-space: nowrap
        }

        #rcount {
            font-size: 9px;
            color: var(--muted);
            white-space: nowrap
        }

        .cat-filters {
            display: flex;
            gap: 5px;
            flex-wrap: nowrap;
            overflow-x: auto
        }

        .cat-filters::-webkit-scrollbar {
            display: none
        }

        .cf {
            padding: 2px 8px;
            border: 1px solid var(--border);
            border-radius: 3px;
            font-size: 8px;
            letter-spacing: 1px;
            color: var(--muted);
            cursor: pointer;
            white-space: nowrap;
            transition: all .15s;
            font-family: var(--font);
            background: none;
        }

        .cf:hover,
        .cf.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 212, 255, .08)
        }

        /* ── MAP ─────────────────────────────────────────────────── */
        #mapwrap {
            position: relative;
            flex-shrink: 0;
            height: clamp(180px, 32vh, 380px);
            background: #04070f;
            border-bottom: 2px solid var(--border-hi);
            overflow: hidden;
        }

        #mapwrap::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at 50% 0%, rgba(0, 212, 255, .05) 0%, transparent 60%);
        }

        #worldmap {
            display: block
        }

        #mtt {
            position: absolute;
            background: rgba(4, 7, 15, .95);
            border: 1px solid var(--border-hi);
            padding: 10px 14px;
            pointer-events: none;
            opacity: 0;
            transition: opacity .15s;
            max-width: 290px;
            z-index: 10;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .6), 0 0 1px var(--border-hi);
        }

        #mtt .mt-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 5px
        }

        #mtt .mt-headline {
            font-size: 10.5px;
            color: var(--bright);
            line-height: 1.5;
            margin-bottom: 5px
        }

        #mtt .mt-time {
            font-size: 8px;
            color: var(--muted)
        }

        #map-stats {
            position: absolute;
            top: 10px;
            right: 14px;
            font-size: 9px;
            color: var(--muted);
            text-align: right;
            pointer-events: none;
        }

        #map-stats div {
            margin-bottom: 3px;
            letter-spacing: 1px
        }

        /* ── AD SLOT (sopra colonne) ─────────────────────────────── */
        #ad-top {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 4px 0;
            min-height: 50px;
            flex-shrink: 0;
            overflow: hidden;
        }

        /* ── AD SIDEBAR ─────────────────────────────────────── */
        #ad-side {
            width: 160px;
            flex-shrink: 0;
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
            gap: 10px;
            overflow: hidden;
        }

        /* ── MAIN CONTENT AREA ───────────────────────────────────── */
        #main-area {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }

        #colwrap {
            flex: 1;
            padding: 14px;
            overflow-y: auto;
            min-height: 0;
        }

        #colwrap::-webkit-scrollbar {
            width: 6px
        }

        #colwrap::-webkit-scrollbar-track {
            background: var(--bg)
        }

        #colwrap::-webkit-scrollbar-thumb {
            background: var(--border-hi);
            border-radius: 3px
        }

        #colwrap::-webkit-scrollbar-thumb:hover {
            background: var(--accent)
        }

        #columns {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: flex-start
        }

        /* ── COLUMN ──────────────────────────────────────────────── */
        .col {
            width: 272px;
            height: 460px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-panel);
            transition: opacity .3s, border-color .3s, box-shadow .3s;
            overflow: hidden;
        }

        .col:hover {
            border-color: var(--border-hi);
            box-shadow: 0 0 20px rgba(0, 0, 0, .4)
        }

        .col.highlighted {
            border-color: var(--accent);
            box-shadow: 0 0 16px rgba(0, 212, 255, .15)
        }

        .col-hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, .02) 0%, transparent 100%);
        }

        .col-name {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase
        }

        .col-meta {
            font-size: 7px;
            color: var(--dim);
            letter-spacing: 1px;
            margin-top: 1px
        }

        .col-cnt {
            font-size: 9px;
            color: var(--muted)
        }

        .col-body {
            flex: 1;
            overflow-y: auto;
            padding: 2px 0;
            scroll-behavior: smooth
        }

        .col-body::-webkit-scrollbar {
            width: 2px
        }

        .col-body::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px
        }

        /* ── CARD ────────────────────────────────────────────────── */
        .card {
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background .12s, border-left .12s;
            animation: si .25s ease;
            display: block;
            text-decoration: none;
            color: inherit;
        }

        @keyframes si {
            from {
                opacity: 0;
                transform: translateY(-4px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .card:hover {
            background: var(--bg-hover)
        }

        .card.brk {
            background: var(--brk-bg);
            border-left: 2px solid var(--brk);
            border-bottom-color: var(--brk-b);
        }

        .card.brk:hover {
            background: rgba(255, 45, 74, .2)
        }

        .ct {
            font-size: 8px;
            color: var(--dim);
            letter-spacing: 1px;
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            gap: 4px
        }

        .ctag {
            padding: 0 4px;
            border-radius: 2px;
            font-size: 7px;
            letter-spacing: 1px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .cc-politica {
            background: rgba(59, 130, 246, .18);
            color: #60a5fa
        }

        .cc-economia {
            background: rgba(16, 185, 129, .18);
            color: #34d399
        }

        .cc-tecnologia {
            background: rgba(139, 92, 246, .18);
            color: #a78bfa
        }

        .cc-scienza {
            background: rgba(245, 158, 11, .18);
            color: #fbbf24
        }

        .cc-mondo {
            background: rgba(100, 116, 139, .18);
            color: #94a3b8
        }

        .cc-urgente {
            background: rgba(255, 45, 74, .28);
            color: #ff2d4a;
            animation: blink 1.1s step-end infinite
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .2
            }
        }

        .ttl {
            font-size: 10.5px;
            font-weight: 700;
            color: var(--bright);
            line-height: 1.4;
            margin-bottom: 3px
        }

        .card.brk .ttl {
            color: #ffb8c4
        }

        .abs {
            font-size: 8.5px;
            color: var(--muted);
            line-height: 1.55;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical
        }

        .src-tag {
            display: inline-block;
            font-size: 7.5px;
            font-weight: 700;
            margin-top: 4px;
            letter-spacing: 2px;
            text-transform: uppercase
        }

        .brkbdg {
            display: inline-block;
            background: var(--brk);
            color: #fff;
            font-size: 7px;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 0 4px;
            margin-right: 3px;
            border-radius: 2px;
            vertical-align: middle;
        }

        /* ── FOOTER ──────────────────────────────────────────────── */
        #ftr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 3px 16px;
            height: 22px;
            background: var(--bg-panel);
            border-top: 1px solid var(--border);
            font-size: 8px;
            color: var(--dim);
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        .abadge {
            padding: 1px 6px;
            border: 1px solid var(--border);
            border-radius: 2px;
            color: var(--dim);
            cursor: pointer;
            transition: all .15s;
            font-family: var(--font);
            font-size: 8px;
            background: none;
        }

        .abadge:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        /* ── MODAL ───────────────────────────────────────────────── */
        #modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(4, 7, 15, .88);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
        }

        #modal.on {
            display: flex
        }

        .mbox {
            background: var(--bg-panel);
            border: 1px solid var(--border-hi);
            padding: 24px 28px;
            width: 560px;
            max-width: 94vw;
            border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0, 0, 0, .7), 0 0 1px var(--border-hi);
        }

        .mtitle {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 3px;
            margin-bottom: 12px;
            padding-bottom: 9px;
            border-bottom: 1px solid var(--border)
        }

        .mtext {
            font-size: 9.5px;
            color: var(--muted);
            line-height: 1.9;
            margin-bottom: 10px
        }

        .mcode {
            background: #00000099;
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 12px;
            font-size: 9px;
            color: var(--accent2);
            line-height: 1.9;
            white-space: pre;
            overflow-x: auto;
            margin-bottom: 10px
        }

        .mclose {
            float: right;
            background: none;
            border: 1px solid var(--dim);
            color: var(--muted);
            font-family: var(--font);
            font-size: 9px;
            padding: 4px 12px;
            cursor: pointer;
            letter-spacing: 2px;
            border-radius: 2px;
            transition: all .15s
        }

        .mclose:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        .empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 140px;
            color: var(--dim);
            font-size: 9px;
            letter-spacing: 2px;
            gap: 6px
        }

        mark {
            background: rgba(0, 212, 255, .2);
            color: var(--accent);
            border-radius: 2px;
            padding: 0 2px
        }

        /* ── RESPONSIVE ──────────────────────────────────────────── */
        @media(max-width:600px) {
            #ad-side {
                display: none
            }

            .col {
                width: calc(100vw - 28px)
            }

            #columns {
                justify-content: center
            }

            #hdr .logo {
                font-size: 10px;
                letter-spacing: 3px
            }
        }
    </style>
</head>

<body>
    <!-- ── APP SHELL ─────────────────────────────────────────────────────────── -->
    <div id="app" style="display:flex;flex-direction:column;height:100vh;overflow:hidden">

        <!-- HEADER -->
        <div id="hdr">
            <div class="logo">NEXUS <span>//</span> TERMINALE MONDIALE</div>
            <div class="vd"></div>
            <div class="sb">
                <div class="dot" id="ldot"></div>
                <span id="fstatus">CONNESSIONE...</span>
                <div class="vd"></div>
                <div class="dot r"></div>
                <span id="bcount">– URGENTI</span>
            </div>
            <div id="nxt">AGG: <span id="cdn">120</span>s</div>
            <div id="clk">--:--:--</div>
        </div>

        <!-- BREAKING TICKER -->
        <div id="ticker">
            <span class="ticker-label">⚡ URGENTE</span>
            <div id="tkscroll"></div>
        </div>

        <!-- SEARCH + CATEGORY FILTERS -->
        <div id="srow">
            <span class="search-icon">▶ FILTRA</span>
            <input id="srch" type="text" placeholder="Cerca titoli, testi, categorie…" autocomplete="off"
                spellcheck="false" />
            <div class="cat-filters">
                <button class="cf" data-cat="">TUTTI</button>
                <button class="cf" data-cat="Politica">POL</button>
                <button class="cf" data-cat="Economia">ECO</button>
                <button class="cf" data-cat="Tecnologia">TECH</button>
                <button class="cf" data-cat="Scienza">SCI</button>
                <button class="cf" data-cat="Urgente">URG</button>
            </div>
            <span id="rcount">caricamento...</span>
        </div>

        <!-- MAP -->
        <div id="mapwrap">
            <canvas id="worldmap"></canvas>
            <div id="mtt">
                <div class="mt-label" id="mtt-label"></div>
                <div class="mt-headline" id="mtt-h"></div>
                <div class="mt-time" id="mtt-t"></div>
            </div>
            <div id="map-stats">
                <div id="ms-total">– ARTICOLI</div>
                <div id="ms-brk">– URGENTI</div>
                <div>14 FONTI ATTIVE</div>
                <div style="color:var(--accent2);margin-top:4px">RSS CLIENT-SIDE</div>
            </div>
        </div>

        <!-- ADSENSE — BANNER ORIZZONTALE (728×90 leaderboard) -->
        <div id="ad-top">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXX" data-ad-slot="0000000001"
                data-ad-format="auto" data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <!-- MAIN: columns + sidebar ad -->
        <div id="main-area">
            <div id="colwrap">
                <div id="columns"></div>
            </div>

            <!-- ADSENSE — SIDEBAR (160×600 wide skyscraper) -->
            <div id="ad-side">
                <ins class="adsbygoogle" style="display:block;width:160px;height:600px"
                    data-ad-client="ca-pub-XXXXXXXXXX" data-ad-slot="0000000002" data-ad-format="auto"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>
        </div>

        <!-- FOOTER -->
        <div id="ftr">
            <div style="display:flex;gap:12px;align-items:center">
                <span>NEXUS v5.0 — ARCHITETTURA FRONTEND PURA</span>
                <span>|</span><span id="tartcl">0 ARTICOLI</span>
                <span id="lupdlbl"></span>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
                <button class="abadge" onclick="openModal('sources')">[ ⚙ INFO FONTI ]</button>
                <button class="abadge" onclick="openModal('adsense')">[ $ ADSENSE ]</button>
            </div>
